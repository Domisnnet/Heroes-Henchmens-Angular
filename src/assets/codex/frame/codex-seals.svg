<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" role="img" aria-labelledby="codex-seals__title codex-seals__desc">
  <title id="codex-seals__title">Codex Seals</title>
  <desc id="codex-seals__desc">Security and classification seals for Codex Vaticinarum records. Supports public, restricted and classified security levels.</desc>
  <defs>
    <g id="codex-seals__public">
      <circle cx="360" cy="40" r="16"/>
      <circle cx="360" cy="40" r="12"/>
      <text class="codex-seals__text" x="360" y="43" text-anchor="middle">PUBLIC</text>
    </g>
    <g id="codex-seals__restricted">
      <rect x="340" y="32" width="40" height="16" rx="2"/>
      <line x1="340" y1="32" x2="380" y2="48"/>
      <line x1="380" y1="32" x2="340" y2="48"/>
      <text class="codex-seals__text" x="360" y="43" text-anchor="middle">RESTRICTED</text>
    </g>
    <g id="codex-seals__classified">
      <polygon points="360,24 376,36 370,56 350,56 344,36"/>
      <circle cx="360" cy="40" r="6"/>
      <text class="codex-seals__text" x="360" y="43" text-anchor="middle">CLASSIFIED</text>
    </g>
    <g id="codex-seals__classification">
      <rect x="24" y="40" width="60" height="16" rx="2"/>
      <text class="codex-seals__text" x="54" y="51" text-anchor="middle">CLASS</text>
    </g>
  </defs>
  <style>
    .codex-seals__outline {
      fill: none;
      stroke: currentColor;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .codex-seals__detail {
      fill: none;
      stroke: currentColor;
      stroke-width: .5;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .codex-seals__text {
      fill: currentColor;
      stroke: none;
      font-family: monospace;
      font-size: 5px;
      user-select: none;
    }
  </style>
  <g id="codex-seals__security" class="codex-seals__outline">
    <use href="#codex-seals__public"/>
  </g>
  <g id="codex-seals__classification-group" class="codex-seals__outline">
    <use href="#codex-seals__classification"/>
  </g>
  <g id="codex-seals__registration" class="codex-seals__detail">
    <circle cx="30" cy="30" r="2"/>
    <circle cx="370" cy="30" r="2"/>
    <circle cx="30" cy="570" r="2"/>
    <circle cx="370" cy="570" r="2"/>
  </g>
  <g id="codex-seals__baseline" class="codex-seals__detail">
    <line x1="30" y1="570" x2="370" y2="570" stroke-dasharray="4 4"/>
  </g>
</svg>