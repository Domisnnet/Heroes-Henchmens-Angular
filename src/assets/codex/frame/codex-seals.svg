<?xml version="1.0" encoding="UTF-8"?>
<!-- ===================================================== -->
<!-- Frame Library                                         -->
<!-- Asset   : codex-seals.svg                             -->
<!-- Version : 2.0.0                                       -->
<!-- Status  : Construction                                -->
<!-- Order Design System                                   -->
<!-- ===================================================== -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" role="img" aria-labelledby="codex-seals__title codex-seals__desc">
  <title id="codex-seals__title">Codex Seals</title>
  <desc id="codex-seals__desc">Security and classification seals for Codex Vaticinarum records.</desc>
  <defs>
    <g id="codex-seals__public">
      <circle cx="0" cy="0" r="16"/>
      <circle cx="0" cy="0" r="12"/>
      <text class="codex-seals__text" x="0" y="3" text-anchor="middle">PUBLIC</text>
    </g>
    <g id="codex-seals__restricted">
      <rect x="-20" y="-8" width="40" height="16" rx="2"/>
      <line x1="-20" y1="-8" x2="20" y2="8"/>
      <line x1="20" y1="-8" x2="-20" y2="8"/>
      <text class="codex-seals__text" x="0" y="3" text-anchor="middle">RESTRICTED</text>
    </g>
    <g id="codex-seals__classified">
      <polygon points="0,-16 16,-4 10,16 -10,16 -16,-4"/>
      <circle cx="0" cy="0" r="6"/>
      <text class="codex-seals__text" x="0" y="3" text-anchor="middle">CLASSIFIED</text>
    </g>
    <g id="codex-seals__classification">
      <rect x="-30" y="-8" width="60" height="16" rx="2"/>
      <text class="codex-seals__text" x="0" y="3" text-anchor="middle">CLASS</text>
    </g>
  </defs>
  <style>
    .codex-seals__outline {
      fill: none;
      stroke: currentColor;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect:non-scaling-stroke;
    }

    .codex-seals__detail {
      fill: none;
      stroke: currentColor;
      stroke-width: .5;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }

    .codex-seals__text {
      fill: currentColor;
      stroke: none;
      font-family: monospace;
      font-size: 5px;
      user-select: none;
    }
  </style>
  <g id="codex-seals__security" class="codex-seals__outline"/>
  <g id="codex-seals__classification-group" class="codex-seals__outline"/>
  <g id="codex-seals__registration" class="codex-seals__detail">
    <circle cx="30" cy="30" r="2"/>
    <circle cx="370" cy="30" r="2"/>
    <circle cx="30" cy="570" r="2"/>
    <circle cx="370" cy="570" r="2"/>
  </g>
  <g id="codex-seals__baseline" class="codex-seals__detail">
    <line x1="30" y1="570" x2="370" y2="570" stroke-dasharray="4 4"/>
  </g>
</svg>