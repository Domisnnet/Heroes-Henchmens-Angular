<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 100" fill="none">
  <title>Feixe Primordial</title>
  <desc>Primordial Beam. Conducts energy between Convergence Nodes.</desc>
  <defs>
    <style>
      .glyph {
        fill: none;
      }

      .beam-primary {
        fill: none;
        stroke: currentColor;
        stroke-width: 18;
        stroke-linecap: round;
      }

      .beam-core {
        fill: none;
        stroke: currentColor;
        stroke-width: 6;
        opacity: .45;
        stroke-linecap: round;
      }
    </style>
  </defs>
  <g class="glyph">
    <line class="beam-primary" x1="50" y1="50" x2="950" y2="50"/>
    <line class="beam-core" x1="50" y1="50" x2="950" y2="50"/>
  </g>
</svg>