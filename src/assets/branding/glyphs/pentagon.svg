<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <title>Pentágono Primordial</title>
  <desc>Primordial Pentagon. Symbol of protection, hierarchy and sacred balance within The Order.</desc>
  <defs>
    <style>
      .glyph {
        fill: none;
      }

      .frame {
        fill: none;
        stroke: currentColor;
        stroke-width: 28;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .frame-secondary {
        fill: none;
        stroke: currentColor;
        stroke-width: 12;
        opacity: .45;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .facet {
        fill: none;
        stroke: currentColor;
        stroke-width: 12;
        opacity: .65;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .core {
        fill: none;
        stroke: currentColor;
        stroke-width: 18;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  <g class="glyph">
    <polygon class="frame" points="500,140 815,370 695,740 305,740 185,370"/>
    <polygon class="frame-secondary" points="500,220 735,390 645,670 355,670 265,390"/>
    <polygon class="core" points="500,455 545,500 500,545 455,500"/>
    <line class="facet" x1="500" y1="140" x2="500" y2="455"/>
    <line class="facet" x1="815" y1="370" x2="545" y2="500"/>
    <line class="facet" x1="695" y1="740" x2="500" y2="545"/>
    <line class="facet" x1="305" y1="740" x2="500" y2="545"/>
    <line class="facet" x1="185" y1="370" x2="455" y2="500"/>
  </g>
</svg>