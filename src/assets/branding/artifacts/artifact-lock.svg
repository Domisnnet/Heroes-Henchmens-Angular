<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <title>Artifact Lock</title>
  <desc>Mechanical iris locking mechanism that secures the Primordial Prism.</desc>
  <defs>
    <style>
      .artifact{
        fill:none;
      }

      .blade{
        fill:none;
        stroke:currentColor;
        stroke-width:8;
        stroke-linecap:round;
        stroke-linejoin:round;
      }

      .guide{
        fill:none;
        stroke:currentColor;
        stroke-width:4;
        opacity:.45;
        stroke-linecap:round;
        stroke-linejoin:round;
      }
    </style>
    <path id="blade" class="blade" d="M500 380 L530 410 L515 455 L500 480 L485 455 L470 410 Z"/>
    <path id="guide" class="guide" d="M500 455 L500 520"/>
  </defs>
  <g class="artifact">
    <use href="#blade"/>
    <use href="#guide"/>
    <use href="#blade" transform="rotate(90 500 500)"/>
    <use href="#guide" transform="rotate(90 500 500)"/>
    <use href="#blade" transform="rotate(180 500 500)"/>
    <use href="#guide" transform="rotate(180 500 500)"/>
    <use href="#blade" transform="rotate(270 500 500)"/>
    <use href="#guide" transform="rotate(270 500 500)"/>
  </g>
</svg>