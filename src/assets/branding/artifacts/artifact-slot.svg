    <path class="guide" d="M560 530 L540 510"/>
    <path class="guide" d="M530 560 L510 540"/>
    <path class="guide" d="M470 560 L490 540"/>
    <path class="guide" d="M440 530 L460 510"/>
    <path class="guide" d="M440 470 L460 490"/>
    <path class="stop" d="M500 392 L490 402 L500 412 L510 402 Z"/>
    <path class="stop" d="M608 500 L598 490 L588 500 L598 510 Z"/>
    <path class="stop" d="M500 608 L490 598 L500 588 L510 598 Z"/>
    <path class="stop" d="M392 500 L402 490 L412 500 L402 510 Z"/>
