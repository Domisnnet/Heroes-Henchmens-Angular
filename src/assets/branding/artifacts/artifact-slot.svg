<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" fill="none">
  <title>Artifact Slot</title>
  <desc>Precision mechanical slot responsible for positioning the Primordial Prism.</desc>
  <defs>
    <style>
      .artifact {
        fill: none;
      }

      .cradle {
        fill: none;
        stroke: currentColor;
        stroke-width: 8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .clamp {
        fill: none;
        stroke: currentColor;
        stroke-width: 6;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .guide {
        fill: none;
        stroke: currentColor;
        stroke-width: 4;
        opacity: .55;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .stop {
        fill: none;
        stroke: currentColor;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>
  <g class="artifact">
