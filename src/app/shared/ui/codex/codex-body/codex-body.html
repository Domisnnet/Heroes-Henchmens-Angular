<section class="codex-body">
  @if (codex().narrative) {
    <div class="codex-body__narrative">
      <p>{{ codex().narrative }}</p>
    </div>
  }
  @if (codex().sections.length) {
    <div class="codex-body__sections">
      @for (section of codex().sections!; track section.id) {
        <app-codex-section [section]="section" />
      }
    </div>
  }
</section>
