<section class="codex-body">
  @if (codex().narrative) {
    <article class="codex-block">
      <header class="codex-block__header">
        <span class="codex-block__label">{{ labels.introduction }}</span>
      </header>
      <div class="codex-block__content">
        <p class="codex-block__text">{{ codex().narrative }}</p>
      </div>
    </article>
  }
  @for (section of codex().sections; track section.id) {
    <article class="codex-block">
      <header class="codex-block__header">
        <span class="codex-block__divider"></span>
        <h2 class="codex-block__title">{{ section.title }}</h2>
        <span class="codex-block__divider"></span>
      </header>
      <div class="codex-block__content">
        <p class="codex-block__text">{{ section.content }}</p>
      </div>
    </article>
  }
</section>
