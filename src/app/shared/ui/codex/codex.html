<article class="codex">
  <div class="codex__background" aria-hidden="true"></div>
  <div #frameContainer class="codex__frame" aria-hidden="true"></div>
  <div class="codex__overlay" aria-hidden="true"></div>
  <main class="codex__document">
    <header class="codex__header">
      <div class="codex__glyph"></div>
      <div class="codex__heading">
        <h1 class="codex__title"></h1>
        <p class="codex__subtitle"></p>
      </div>
    </header>
    <section class="codex__metadata"></section>
    <section class="codex__description"></section>
    <section class="codex__content"></section>
    <aside class="codex__timeline"></aside>
    <footer class="codex__footer"></footer>
  </main>
  <div class="codex__effects" aria-hidden="true"></div>
</article>
