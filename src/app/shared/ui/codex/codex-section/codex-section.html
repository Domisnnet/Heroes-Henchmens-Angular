<section class="codex-section">
  @if (section().title) {
    <header class="codex-section__header">
      <h2 class="codex-section__title">{{ section().title }}</h2>
    </header>
  }
  <div class="codex-section__content">
    @if (section().content) {
      <p class="codex-section__text">{{ section().content }}</p>
    }
  </div>
</section>
