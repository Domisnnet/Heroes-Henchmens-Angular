<app-header [message]="headerMessage" />
<section class="result">
  <main class="result__content">
    <div class="result__card">
      <h2 class="result__title">{{ result.title }}</h2>
      <p class="result__description">{{ result.description }}</p>
      <p class="result__message">{{ result.message }}</p>
      <div class="result__actions">
        <button type="button" class="result__card-button" (click)="restart()">🔄 Jogar novamente</button>
      </div>
    </div>
  </main>
</section>
<app-footer [message]="footerMessage" />
